<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panda Crypto Man</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

canvas{
background:#111;
border:4px solid #00ff99;
margin-top:10px;
}

button{
font-size:22px;
margin:6px;
padding:12px;
border-radius:10px;
border:none;
background:#00ff99;
}
</style>
</head>

<body>

<h2>🐼 Panda Crypto Man</h2>
Score: <span id="score">0</span>

<br>

<canvas id="game" width="400" height="400"></canvas>

<br>

<button onclick="move('left')">⬅</button>
<button onclick="move('up')">⬆</button>
<button onclick="move('down')">⬇</button>
<button onclick="move('right')">➡</button>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let panda = {x:200,y:200,size:16}
let dir = "right"

let score = 0

let coins=[]
let ghosts=[]

for(let i=0;i<40;i++){
coins.push({
x:Math.random()*380,
y:Math.random()*380
})
}

function spawnGhost(){
const types=["BTC","DOGE","PEPE","ETH"]

ghosts.push({
x:Math.random()*380,
y:Math.random()*380,
type:types[Math.floor(Math.random()*types.length)],
size:18
})
}

setInterval(spawnGhost,4000)

function move(d){
dir=d
}

document.addEventListener("keydown",e=>{
if(e.key=="ArrowLeft") dir="left"
if(e.key=="ArrowRight") dir="right"
if(e.key=="ArrowUp") dir="up"
if(e.key=="ArrowDown") dir="down"
})

function update(){

if(dir=="left") panda.x-=3
if(dir=="right") panda.x+=3
if(dir=="up") panda.y-=3
if(dir=="down") panda.y+=3

if(panda.x<0) panda.x=400
if(panda.x>400) panda.x=0
if(panda.y<0) panda.y=400
if(panda.y>400) panda.y=0

coins.forEach((c,i)=>{
if(Math.abs(panda.x-c.x)<14 && Math.abs(panda.y-c.y)<14){
coins.splice(i,1)
score+=1
document.getElementById("score").innerText=score
}
})

ghosts.forEach((g,i)=>{
if(Math.abs(panda.x-g.x)<18 && Math.abs(panda.y-g.y)<18){
score+=20
ghosts.splice(i,1)
document.getElementById("score").innerText=score
}
})

}

function draw(){

ctx.clearRect(0,0,400,400)

coins.forEach(c=>{
ctx.fillStyle="#00ff99"
ctx.beginPath()
ctx.arc(c.x,c.y,4,0,Math.PI*2)
ctx.fill()
})

ghosts.forEach(g=>{
ctx.fillStyle="#ff44ff"
ctx.font="12px Arial"
ctx.fillText(g.type,g.x,g.y)
})

ctx.fillStyle="white"
ctx.beginPath()
ctx.arc(panda.x,panda.y,panda.size,0,Math.PI*2)
ctx.fill()

ctx.fillStyle="black"
ctx.beginPath()
ctx.arc(panda.x-5,panda.y-5,3,0,Math.PI*2)
ctx.arc(panda.x+5,panda.y-5,3,0,Math.PI*2)
ctx.fill()

}

function gameLoop(){
update()
draw()
requestAnimationFrame(gameLoop)
}

gameLoop()

</script>

</body>
</html>
